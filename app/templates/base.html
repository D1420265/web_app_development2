<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字系統</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>
    <!-- 導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">📖 英文單字系統</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.index') }}">總單字庫</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.new_word') }}">新增單字</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.collection_list') }}">個人單字本</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.quiz') }}">單字測驗</a>
                    </li>
                </ul>
                <form class="d-flex" action="{{ url_for('main.search') }}" method="GET">
                    <input class="form-control me-2" type="search" name="q" placeholder="搜尋單字..." aria-label="Search" value="{{ request.args.get('q', '') }}">
                    <button class="btn btn-outline-light" type="submit">搜尋</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- 內容區塊 -->
    <div class="container">
        <!-- Flash 訊息顯示區塊 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- 各頁面內容 -->
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
